  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-size: 16px;
    }
    a { color: inherit; }
    em { font-style: italic; }
    ::selection { background: #1F3A2E; color: #FBF7F0; }
    html { scroll-behavior: smooth; }

    :root {
      --pad-x: 40px;
      --pad-x-lg: 80px;
    }
    @media (max-width: 960px) {
      :root {
        --pad-x: 24px;
        --pad-x-lg: 48px;
      }
      .ys-nav-links { display: none !important; }
      .ys-nav-burger { display: flex !important; }
      .ys-section-head,
      .ys-map-grid,
      .ys-faq-grid,
      .ys-apply-grid,
      .ys-sell-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
      .ys-apply-stepper { display: flex !important; overflow-x: auto; gap: 8px; }
      .ys-form-grid { grid-template-columns: 1fr !important; }
      .ys-hero-row { grid-template-columns: 1fr !important; gap: 28px !important; }
      .ys-hero-stats { grid-template-columns: 1fr 1fr !important; gap: 24px 16px !important; }
      .ys-hero-stats > div { border-left: none !important; padding-left: 0 !important; }
      .ys-prop-grid { grid-template-columns: 1fr !important; }
      .ys-floor-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
      .ys-floor-detail { position: static !important; padding: 28px !important; }
      .ys-about-grid { grid-template-columns: 1fr !important; }
      .ys-contact-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
      .ys-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
      .ys-hero { padding-top: 88px !important; padding-bottom: 28px !important; }
    }
    @media (max-width: 540px) {
      :root {
        --pad-x: 20px;
        --pad-x-lg: 40px;
      }
      .ys-hero-stats { grid-template-columns: 1fr !important; }
      .ys-footer-grid { grid-template-columns: 1fr !important; }
    }
    .ys-ig-grid { grid-template-columns: repeat(6, 1fr) !important; }
    @media (max-width: 960px) {
      .ys-ig-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 540px) {
      .ys-ig-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    .ys-map-popup .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 8px 32px rgba(27,42,74,0.18); padding: 0; overflow: hidden; }
    .ys-map-popup .leaflet-popup-content { margin: 0; padding: 0; line-height: 1.4; }
    .ys-map-popup .leaflet-popup-tip { background: #fff; }
    .ys-map-popup a.leaflet-popup-close-button { color: #2D2D2D; font-size: 18px; top: 6px; right: 6px; width: 24px; height: 24px; text-align: center; line-height: 24px; background: rgba(255,255,255,0.85); border-radius: 50%; }
    @media (max-width: 540px) { .ys-map-popup .leaflet-popup-content-wrapper { max-width: 240px; } }

    /* Leaflet map tile rendering fixes */
    .leaflet-container { background: #f0f0f0 !important; }
    .leaflet-tile-container img { will-change: transform; backface-visibility: hidden; }
    .leaflet-map-pane { transform: translate3d(0,0,0); }
    .leaflet-tile { border: none !important; clip: auto !important; }

    /* Hero background video / image */
    .ys-hero-media {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .ys-hero-media-img {
      animation: kenBurns 25s ease-in-out infinite alternate;
    }
    @keyframes kenBurns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-1%, -1%); }
    }
    .ys-hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      background: linear-gradient(120deg, rgba(250,250,248,0.70) 0%, rgba(250,250,248,0.40) 45%, rgba(250,250,248,0.10) 75%, rgba(250,250,248,0) 100%);
    }
    .ys-hero-content {
      position: relative;
      z-index: 2;
    }
    @media (min-width: 1100px) {
      .ys-avail-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 1099px) and (min-width: 700px) {
      .ys-avail-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .ys-req-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 699px) {
      .ys-avail-grid { grid-template-columns: 1fr !important; }
      .ys-req-grid { grid-template-columns: 1fr !important; }
    }
  </style>
  <link rel="stylesheet" href="mobile-fixes.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script src="js/shared.js"></script>
  <script src="js/page-home.js"></script>

  <!-- Look & Lease Popup -->
  <style>
    .ys-popup-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(27, 42, 74, 0.35);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px; opacity: 0;
      transition: opacity 350ms ease;
    }
    .ys-popup-overlay.active { display: flex; opacity: 1; }
    .ys-popup-card {
      position: relative; width: 100%; max-width: 480px;
      border-radius: 14px; overflow: hidden;
      background: #FAFAF8;
      border: 1px solid rgba(27, 42, 74, 0.10);
      box-shadow: 0 16px 48px rgba(27, 42, 74, 0.14);
      color: #2D2D2D; text-align: center;
    }
    .ys-popup-banner {
      position: relative; height: 140px;
      background: url('images/hero-aerial.jpg') center/cover no-repeat;
    }
    .ys-popup-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(250,250,248,0.20) 0%, rgba(250,250,248,0.85) 100%);
    }
    .ys-popup-content { padding: 28px 36px 36px; }
    .ys-popup-close {
      position: absolute; top: 12px; right: 12px; z-index: 100;
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(250,250,248,0.95); color: #2D2D2D; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(27,42,74,0.20);
      transition: background 200ms ease, transform 200ms ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      padding: 0;
    }
    .ys-popup-close:hover { background: #FFFFFF; transform: scale(1.05); }
    .ys-popup-close svg { width: 18px; height: 18px; }
    .ys-popup-logo {
      font-family: 'Lora', Georgia, serif; font-size: 20px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 6px; color: #1B2A4A;
    }
    .ys-popup-tagline {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: #C9A96E; margin-bottom: 20px;
    }
    .ys-popup-headline {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 34px; font-weight: 700; line-height: 1.1;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;
      color: #2D2D2D;
    }
    .ys-popup-sub {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 17px; line-height: 1.55; color: #5A5A5A;
      margin-bottom: 28px; max-width: 340px; margin-left: auto; margin-right: auto;
    }
    .ys-popup-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px;
      background: #1B2A4A; color: #FAFAF8;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
      text-transform: uppercase; text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 2px 8px rgba(27,42,74,0.12);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }
    .ys-popup-btn:hover {
      transform: translateY(-2px); background: #243554;
      box-shadow: 0 8px 24px rgba(27,42,74,0.18);
    }
    @media (max-width: 540px) {
      .ys-popup-card { max-width: 100%; }
      .ys-popup-content { padding: 24px 24px 32px; }
      .ys-popup-headline { font-size: 28px; }
      .ys-popup-sub { font-size: 16px; }
      .ys-popup-logo { font-size: 18px; }
      .ys-popup-banner { height: 120px; }
    }
  </style>
  <div id="ysLookLeasePopup" class="ys-popup-overlay" aria-hidden="true">
    <div class="ys-popup-card" role="dialog" aria-modal="true" aria-labelledby="ysPopupTitle">
      <div class="ys-popup-banner" aria-hidden="true"></div>
      <button type="button" class="ys-popup-close" id="ysPopupCloseBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <div class="ys-popup-content">
        <div class="ys-popup-logo">Yellowstone Asset Management</div>
        <div class="ys-popup-headline" id="ysPopupTitle">Look &amp; Lease Special!</div>
        <div class="ys-popup-sub">Tour today and sign a lease to receive an exclusive move-in offer. Limited time only!</div>
        <a class="ys-popup-btn" href="contact.html">Contact Us</a>
      </div>
    </div>
  </div>
  <script>
    // Popup close handler — attached directly to window so it always exists
    window.closeYsPopup = function() {
      var popup = document.getElementById('ysLookLeasePopup');
      if (!popup) return;
      popup.classList.remove('active');
      popup.setAttribute('aria-hidden', 'true');
      setTimeout(function() { popup.style.display = 'none'; }, 350);
      sessionStorage.setItem('ysLookLeaseShown', '1');
    };

    // Setup popup after DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      function openPopup() {
        var popup = document.getElementById('ysLookLeasePopup');
        if (!popup) return;
        popup.style.display = 'flex';
        void popup.offsetWidth;
        popup.classList.add('active');
        popup.setAttribute('aria-hidden', 'false');
      }

      // Attach close handler directly to button
      var closeBtn = document.getElementById('ysPopupCloseBtn');
      if (closeBtn) {
        closeBtn.onclick = function(e) {
          e.preventDefault();
          e.stopPropagation();
          window.closeYsPopup();
          return false;
        };
      }

      // Click outside to close
      var popup = document.getElementById('ysLookLeasePopup');
      if (popup) {
        popup.onclick = function(e) {
          if (e.target === popup) window.closeYsPopup();
        };
      }

      // Escape key to close
      document.onkeydown = function(e) {
        if (e.key === 'Escape') window.closeYsPopup();
      };

      // Auto-show after delay (desktop only)
      var shown = sessionStorage.getItem('ysLookLeaseShown');
      var isMobile = window.innerWidth <= 768 || 'ontouchstart' in window;
      if (!shown && !isMobile) {
        setTimeout(openPopup, 6000);
      }
    });
  </script>
