<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Background Test</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("images/hero-aerial.jpg");
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .text {
      position: relative;
      z-index: 1;
      padding: 100px;
      font-size: 48px;
      font-family: sans-serif;
      color: #1B2A4A;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="bg"></div>
    <div class="text">If you see a landscape photo behind this text, the image is loading correctly.</div>
  </div>
</body>
</html>
