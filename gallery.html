<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery | RentInAlvin — Apartments &amp; Townhomes in Alvin, TX</title>
  <meta name="description" content="Photo gallery of RentInAlvin properties in Alvin, Texas. See exteriors, interiors, and community spaces." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://yellowstone-am.com/gallery.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; font-size: 16px; }
    a { color: inherit; } em { font-style: italic; }
    ::selection { background: #1F3A2E; color: #FBF7F0; }
    html { scroll-behavior: smooth; }
    :root { --pad-x: 40px; --pad-x-lg: 80px; }
    .ys-gallery-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 12px !important; }
    .ys-gallery-grid > div { aspect-ratio: 4/3; }
    .ys-gallery-grid > div:nth-child(4n+1) { aspect-ratio: 3/4; }
    .ys-gallery-grid > div:nth-child(4n+2) { aspect-ratio: 16/9; }
    .ys-gallery-grid > div:nth-child(4n+3) { aspect-ratio: 1/1; }
    @media (max-width: 960px) {
      :root { --pad-x: 24px; --pad-x-lg: 48px; }
      .ys-nav-links { display: none !important; }
      .ys-nav-burger { display: flex !important; }
      .ys-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
      .ys-gallery-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .ys-gallery-grid > div:nth-child(n) { aspect-ratio: 4/3; }
    }
    @media (max-width: 640px) {
      :root { --pad-x: 20px; --pad-x-lg: 40px; }
      .ys-footer-grid { grid-template-columns: 1fr !important; }
      .ys-gallery-grid {
        display: flex !important;
        grid-template-columns: none !important;
        gap: 10px !important;
        overflow-x: auto !important;
        scroll-snap-type: x mandatory !important;
        -webkit-overflow-scrolling: touch !important;
        padding-bottom: 16px !important;
        scrollbar-width: none;
      }
      .ys-gallery-grid::-webkit-scrollbar { display: none; }
      .ys-gallery-grid > div {
        flex: 0 0 82vw !important;
        scroll-snap-align: start !important;
        width: 82vw !important;
        aspect-ratio: 4/3 !important;
      }
      .ys-gallery-grid > div:nth-child(n) { aspect-ratio: 4/3 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="api-client.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="page-gallery.jsx"></script>
</body>
</html>
